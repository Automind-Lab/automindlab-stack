name: example-contract-validation

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run example contract tests
        run: node --test services/diagnostic/test/example-contracts.test.js
