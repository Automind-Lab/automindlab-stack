name: AutoMindLab Issue to PR

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to process
        required: true
        type: string
      dry_run:
        description: Only generate the plan and policy comments
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: automindlab-issue-to-pr-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'autonomy:ready'
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.issue.outputs.issue_number }}
      executor_allowed: ${{ steps.plan.outputs.executor_allowed }}
      branch_name: ${{ steps.plan.outputs.branch_name }}
      policy_decision: ${{ steps.policy.outputs.policy_decision }}
      dry_run: ${{ steps.flags.outputs.dry_run }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve dry run mode
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate autonomy plan
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .github/autonomy
          bash scripts/github-issue-planner.sh \
            "${{ github.repository }}" \
            "${{ steps.issue.outputs.issue_number }}" \
            > .github/autonomy/plan.json
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const plan = JSON.parse(fs.readFileSync(".github/autonomy/plan.json", "utf8"));
          console.log(`executor_allowed=${plan.executor_allowed ? "true" : "false"}`);
          console.log(`branch_name=${plan.branch_name}`);
          NODE

      - name: Run policy check
        id: policy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/github-policy-check.sh .github/autonomy/plan.json > .github/autonomy/policy.json
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const policy = JSON.parse(fs.readFileSync(".github/autonomy/policy.json", "utf8"));
          console.log(`policy_decision=${policy.decision}`);
          NODE

      - name: Post plan and policy summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/render-github-plan-comment.mjs \
            .github/autonomy/plan.json \
            .github/autonomy/policy.json \
            > .github/autonomy/plan-comment.md
          gh issue comment "${{ steps.issue.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file .github/autonomy/plan-comment.md

      - name: Upload autonomy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automindlab-autonomy-${{ steps.issue.outputs.issue_number }}
          path: .github/autonomy/

  autonomy:
    needs: plan
    if: |
      needs.plan.outputs.dry_run != 'true' &&
      needs.plan.outputs.executor_allowed == 'true' &&
      needs.plan.outputs.policy_decision == 'allow' &&
      vars.AUTOMIND_AUTONOMY_EXECUTION_ENABLED == 'true'
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download autonomy artifacts
        uses: actions/download-artifact@v4
        with:
          name: automindlab-autonomy-${{ needs.plan.outputs.issue_number }}
          path: .github/autonomy

      - name: Ensure GitHub CLI is available
        run: gh --version

      - name: Create autonomy branch
        run: |
          git switch -c "${{ needs.plan.outputs.branch_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run executor
        env:
          AUTOMINDLAB_GITHUB_AUTONOMY_EXECUTOR: ${{ vars.AUTOMINDLAB_GITHUB_AUTONOMY_EXECUTOR }}
        run: |
          bash scripts/github-change-executor.sh .github/autonomy/plan.json

      - name: Run verifier
        run: |
          bash scripts/github-verifier.sh .github/autonomy/plan.json > .github/autonomy/verify.json

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes were produced by the executor."
            exit 0
          fi
          git add .
          git commit -m "autonomy: apply issue #${{ needs.plan.outputs.issue_number }}"
          git push --set-upstream origin "${{ needs.plan.outputs.branch_name }}"

      - name: Open draft pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff origin/${{ github.event.repository.default_branch }}...HEAD --quiet; then
            echo "No diff to open as PR."
            exit 0
          fi
          node scripts/render-github-pr-body.mjs \
            .github/autonomy/plan.json \
            .github/autonomy/policy.json \
            .github/autonomy/verify.json \
            > .github/autonomy/pr-body.md
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ needs.plan.outputs.branch_name }}" \
            --title "autonomy: address issue #${{ needs.plan.outputs.issue_number }}" \
            --body-file .github/autonomy/pr-body.md \
            --draft
