name: governance-validation

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check governance docs exist
        run: |
          test -f CONTRIBUTING.md
          test -f RUNBOOK.md
          test -f docs/REPO_HYGIENE.md
          test -f docs/MEMORY_STRATEGY.md
          test -f docs/WORKER_DELEGATION_PROTOCOL.md
          test -f docs/NETWORK_POLICY.md
          test -f docs/REPO_BOUNDARY_POLICY.md
          test -f docs/CAPABILITY_INTAKE_POLICY.md
          test -f docs/OPERATOR_SURFACE_CONTRACT.md
          test -f docs/OPERATOR_APPROVAL_POLICY.md
          test -f docs/RUNTIME_PROFILE_COMPATIBILITY.md
          test -f docs/GITHUB_AUTOMATION.md
          test -f docs/GITHUB_AUTONOMY.md
          test -f docs/DOWNSTREAM_SYNC_CONTRACT.md

      - name: Validate repo operating system
        run: |
          node scripts/validate-repo-operating-system.mjs
          node scripts/validate-github-automation.mjs
          node scripts/validate-capability-intake.mjs
          node scripts/validate-runtime-topology-profiles.mjs
          node scripts/validate-operator-surfaces.mjs

      - name: Run memory schema sanity test
        run: node --test services/diagnostic/test/memory-schema.test.js
