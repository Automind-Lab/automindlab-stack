name: adaptive-skills-reporting

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  report-adaptive-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate adaptive store and helpers exist
        run: |
          test -f config/schemas/adaptive-skills-store.schema.json
          test -f data/adaptive-skills-store.json
          test -f scripts/skill-stats.mjs
          test -f config/skills/automindlab-baseline-pack.json

      - name: Run adaptive skill stats report
        run: node scripts/skill-stats.mjs
