name: repo-health

on:
  schedule:
    - cron: '17 11 * * 1'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check key directories
        run: |
          test -d context/council
          test -d context/council/diagnostic
          test -d services/diagnostic
          test -d scripts
          test -d docs
          test -d .ona/skills
          test -d config/intake
          test -d config/operator
          test -d config/runtime-profiles
          test -d config/skills
          test -d config/routines

      - name: Validate council seat count
        run: |
          count=$(find context/council -maxdepth 1 -name '*.md' ! -name 'COUNCIL_OF_13.md' | wc -l | tr -d ' ')
          echo "Council seat files: $count"
          test "$count" -eq 13

      - name: Verify specialist markers
        run: |
          grep -q 'The Pump Specialist is a specialist agent, not a numbered council seat.' context/council/diagnostic/PUMP_SPECIALIST.md
          grep -q 'Council Composition & Influence' context/council/diagnostic/PUMP_SPECIALIST.md

      - name: Verify repo operating system and workflow validators
        run: |
          node scripts/validate-repo-operating-system.mjs
          node scripts/validate-workflows.mjs
          node scripts/validate-runtime-contracts.mjs
          node scripts/validate-github-automation.mjs
          node scripts/validate-downstream-sync.mjs
          node scripts/validate-capability-intake.mjs
          node scripts/validate-runtime-topology-profiles.mjs
          node scripts/validate-operator-surfaces.mjs
          node scripts/openclaw-fixture-smoke.mjs

      - name: Verify module resolution
        run: node -e "require('./services/diagnostic/consultation-service')"

      - name: Check shell script syntax
        run: |
          bash -n scripts/bootstrap-recovery.sh
          bash -n scripts/configure-openclaw-agents.sh
          bash -n scripts/github-change-executor.sh
          bash -n scripts/github-issue-planner.sh
          bash -n scripts/github-policy-check.sh
          bash -n scripts/github-verifier.sh
          bash -n scripts/runtime-doctor.sh
          bash -n scripts/sync-openclaw-workspaces.sh
          bash -n scripts/worker-status.sh
