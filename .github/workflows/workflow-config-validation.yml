name: workflow-config-validation

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate workflow config JSON files
        run: node scripts/validate-workflows.mjs

      - name: Validate skills index references
        run: |
          grep -q 'runtime-doctoring.md' .ona/skills/INDEX.md
          grep -q 'workflow-validation.md' .ona/skills/INDEX.md
