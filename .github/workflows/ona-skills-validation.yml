name: ona-skills-validation

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate-ona-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate machine-readable skills registry
        run: node scripts/validate-ona-skills.mjs

      - name: Validate baseline skill pack
        run: node scripts/automind-skill-pack.mjs validate

      - name: Validate adaptive skills files exist
        run: |
          test -f .ona/skills/index.json
          test -f data/adaptive-skills-store.json
          test -f scripts/skill-learn.sh
