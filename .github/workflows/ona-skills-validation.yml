name: ona-skills-validation

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  validate-ona-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate machine-readable skills registry
        run: |
          python3 scripts/validate-ona-skills.py

      - name: Validate adaptive skill store exists
        run: |
          test -f data/adaptive-skills-store.json
